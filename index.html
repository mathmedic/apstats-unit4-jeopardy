  body { font-family: 'Avenir', Arial, sans-serif; background: #f4f4f4; color: #414142; min-height: 100vh; }

  #home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  #home .logo { max-width: 320px; margin-bottom: 2rem; }
  #home h1 { font-size: 2rem; color: #414142; margin-bottom: 0.5rem; text-align: center; }
  #home p { color: #888; margin-bottom: 2rem; font-size: 1rem; text-align: center; }
  #home .team-setup { width: 100%; max-width: 480px; background: #fff; border-radius: 12px; padding: 1.5rem; border: 1px solid #e0e0e0; margin-bottom: 1.5rem; }
  #home .team-setup h2 { font-size: 1rem; color: #414142; margin-bottom: 1rem; font-weight: 500; }
  #home .team-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  #home .team-input-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  #home .team-input-row button { padding: 8px 16px; background: #08766D; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #home .team-input-row button:hover { background: #3EBEB1; }
  #home .team-list { display: flex; flex-wrap: wrap; gap: 8px; }
  #home .team-pill { background: #E6F7F5; color: #08766D; padding: 4px 12px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  #home .team-pill button { background: none; border: none; cursor: pointer; color: #08766D; font-size: 14px; line-height: 1; padding: 0; }
  #home .start-btn { padding: 14px 40px; background: #08766D; color: #fff; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: 500; }
  #home .start-btn:hover { background: #3EBEB1; }
  #home .start-btn:disabled { background: #ccc; cursor: default; }

  #game { display: none; padding: 1rem; max-width: 900px; margin: 0 auto; }
  .game-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .game-header .mm-logo { height: 28px; }
  .game-header .back-btn { padding: 6px 14px; background: transparent; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 13px; color: #414142; }
  .game-header .back-btn:hover { background: #f0f0f0; }

  .score-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .team-card { flex: 1; min-width: 120px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .team-name { font-size: 12px; color: #888; }
  .team-score { font-size: 22px; font-weight: 500; color: #414142; }
  .score-btns { display: flex; gap: 4px; }
  .score-btn { background: transparent; border: 1px solid #ddd; border-radius: 6px; padding: 2px 8px; font-size: 13px; cursor: pointer; color: #414142; }
  .score-btn:hover { background: #f0f0f0; }

  .categories { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .cat-header { background: #08766D; color: #fff; font-weight: 500; font-size: 20px; text-align: center; padding: 14px 8px; border-radius: 8px; line-height: 1.3; min-height: 60px; display: flex; align-items: center; justify-content: center; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cell { background: #B2D8D2; color: #414142; font-size: 26px; font-weight: 500; text-align: center; padding: 20px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; min-height: 80px; display: flex; align-items: center; justify-content: center; border: none; width: 100%; }
  .cell:hover { background: #08766D; }
  .cell.used { background: #e8e8e8; color: #bbb; cursor: default; font-size: 14px; pointer-events: none; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 2rem; max-width: 580px; width: 100%; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-plus { position: absolute; bottom: 16px; right: 16px; width: 28px; height: 28px; object-fit: contain; opacity: 0.85; }
  .modal-pts { font-size: 13px; color: #3EBEB1; font-weight: 500; margin-bottom: 4px; }
  .modal-cat { font-size: 13px; color: #888; margin-bottom: 14px; }
  .modal-stem { font-size: 13px; color: #666; line-height: 1.7; background: #f7f7f7; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; text-align: left; border-left: 3px solid #3EBEB1; }
  .modal-q { font-size: 17px; color: #414142; line-height: 1.6; margin-bottom: 28px; font-weight: 500; }
  .btn-row { display: flex; gap: 10px; justify-content: center; padding-bottom: 8px; }
  .modal-btn { background: #08766D; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .modal-btn:hover { background: #3EBEB1; }
  .modal-btn-ghost { background: transparent; color: #888; border: 1px solid #ddd; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; }
  .modal-btn-ghost:hover { background: #f0f0f0; }
</style>
</head>

<script>
const stemA = "Trusha's phone keeps track of her screen time. Over the past year, her screen time has followed an approximately normal distribution with a mean of 255 minutes and a standard deviation of 29 minutes. Suppose a randomly selected day from the past year is selected and Trusha's screen time from that day is recorded.";
const stemB = "Every hour, Trusha's phone randomly selects one of the photos from her \"Favorites\" album for her lock screen wallpaper with replacement. In Trusha's \"Favorites\" album, 3.8% of the photos are of her dog, Mance. For one 24-hour period, Trusha records the number of lock screen photos that are of Mance.";
const stemC = "Every hour, Trusha's phone randomly selects one of the photos from her \"Favorites\" album for her lock screen wallpaper with replacement. In Trusha's \"Favorites\" album, 3.8% of the photos are of her dog, Mance. For two straight weeks (336 hours), Trusha records the number of lock screen photos that are of Mance.";
const stemAext = stemA + " Trusha's friend Mariana has also been tracking her screen time. Her screen time is approximately normally distributed with a mean of 245 minutes and a standard deviation of 37 minutes. Suppose a day is randomly selected for each person independently.";

const questions = [
  [
    { pts: 100, stem: stemA, q: "Identify and classify the random variable of interest." },
    { pts: 200, stem: stemA, q: "Calculate the probability that Trusha's screen time on a randomly selected day is less than 4 hours." },
    { pts: 300, stem: stemA, q: "Suppose five days are randomly selected. Calculate the probability that Trusha's screen time is less than 4 hours for none of the five days." },
    { pts: 400, stem: stemAext, q: "Describe the distribution of the difference in screen time for Trusha and Mariana." },
    { pts: 500, stem: stemAext, q: "Calculate the probability that the screen time for Trusha's randomly selected day is less than the screen time for Mariana's randomly selected day." },
  ],
  [
    { pts: 100, stem: stemB, q: "Define the random variable of interest and state how it is distributed." },
    { pts: 200, stem: stemB, q: "Calculate the probability that Trusha's lock screen will display Mance as the wallpaper exactly 2 times in a 24-hour period." },
    { pts: 300, stem: stemB, q: "Calculate the probability that Trusha's lock screen will display Mance as the wallpaper at most 2 times in a 24-hour period." },
    { pts: 400, stem: stemB, q: "Calculate the probability that Trusha's lock screen will display Mance as the wallpaper at least 2 times in a 24-hour period." },
    { pts: 500, stem: stemB, q: "Calculate the probability that Trusha's lock screen will not display Mance as the wallpaper at all in a 24-hour period." },
  ],
  [
    { pts: 100, stem: stemC, q: "Is the 10% condition met? Explain." },
    { pts: 200, stem: stemC, q: "Is the large counts condition met? Explain." },
    { pts: 300, stem: stemC, q: "Why is checking the 10% condition and the large counts condition important?" },
    { pts: 400, stem: stemC, q: "Calculate the mean and standard deviation of the distribution of number of Mance photos in 336 lock screen photos." },
    { pts: 500, stem: stemC, q: "Calculate the probability that the number of Mance photos on Trusha's lock screen in 336 hours is more than 15." },
  ],
];

const cats = ["Normal Distributions", "Binomial Distributions", "Normal Approximation"];
let used = {};
let teams = [];
let currentCell = null;
let lastCell = null;

function homeAddTeam() {
  const input = document.getElementById('homeTeamInput');
  const name = input.value.trim();
  if (!name) return;
  teams.push({ name, score: 0 });
  input.value = '';
  renderHomeTeams();
  document.getElementById('startBtn').disabled = false;
}

function renderHomeTeams() {
  const list = document.getElementById('homeTeamList');
  list.innerHTML = '';
  teams.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'team-pill';
    pill.innerHTML = t.name + '<button onclick="removeTeam(' + i + ')">×</button>';
    list.appendChild(pill);
  });
}

function removeTeam(i) {
  teams.splice(i, 1);
  renderHomeTeams();
  if (teams.length === 0) document.getElementById('startBtn').disabled = true;
}

function startGame() {
  used = {};
  document.getElementById('home').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  buildGrid();
  renderScores();
}

function goHome() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 3; col++) {
      const q = questions[col][row];
      const key = col + '-' + row;
      const cell = document.createElement('button');
      cell.className = 'cell' + (used[key] ? ' used' : '');
      cell.textContent = used[key] ? '' : '$' + q.pts;
      cell.dataset.key = key;
      if (!used[key]) {
        cell.onclick = function() {
          currentCell = key;
          lastCell = key;
          document.getElementById('mPts').textContent = '$' + q.pts;
          document.getElementById('mCat').textContent = cats[col];
          document.getElementById('mStem').textContent = q.stem;
          document.getElementById('mQ').textContent = q.q;
          document.getElementById('modal').classList.add('open');
        };
      }
      grid.appendChild(cell);
    }
  }
}

function closeModal(markUsed) {
  if (markUsed && currentCell) {
    used[currentCell] = true;
    buildGrid();
  }
  document.getElementById('modal').classList.remove('open');
  currentCell = null;
}

function renderScores() {
  const bar = document.getElementById('scoreBar');
  bar.innerHTML = '';
  teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = '<div><div class="team-name">' + t.name + '</div><div class="team-score" id="score-' + i + '">' + t.score + '</div></div>' +
      '<div class="score-btns">' +
      '<button class="score-btn" onclick="adjustScore(' + i + ', -1)">−</button>' +
      '<button class="score-btn" onclick="adjustScore(' + i + ', 1)">+</button>' +
      '</div>';
    bar.appendChild(card);
  });
}

function adjustScore(i, dir) {
  const cell = currentCell || lastCell;
  if (!cell) return;
  const parts = cell.split('-');
  const pts = questions[parts[0]][parts[1]].pts;
  teams[i].score += dir * pts;
  document.getElementById('score-' + i).textContent = teams[i].score;
}

document.getElementById('homeTeamInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') homeAddTeam();
});
</script>
